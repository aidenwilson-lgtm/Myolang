name: Build Myo Compiler for Linux

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    # This natively grabs a true 32-bit Python runtime environment
    - name: Set up 32-bit Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x86'

    # Pull down the 32-bit dev dependencies for compiling your C/C++ libraries
    - name: Install 32-bit system dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y gcc-multilib g++-multilib libc6-dev:i386 libasound2-dev:i386 libsdl2-dev:i386

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Verify that python sees itself running on a 32-bit architecture
        python -c "import platform; print(platform.architecture())"
        pip install pyinstaller pygame ply llvmlite

    - name: Run PyInstaller for 32-bit Linux
      run: |
        pyinstaller --onefile --name=myo \
          --add-data "parser_myo.py:." \
          --add-data "lexer.py:." \
          --add-data "ast_nodes.py:." \
          --add-data "codegen.py:." \
          myo.py

    - name: Upload Compiled 32-bit Linux Binary
      uses: actions/upload-artifact@v4
      with:
        name: myo-linux
        path: dist/myo
