name: Build Myo Compiler for Linux

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    # Set up a 32-bit execution context via Conda
    - name: Setup Miniconda (32-bit)
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: '3.11'
        architecture: 'x86' # Forces a 32-bit Conda environment

    # Pull down the 32-bit development libraries required for compilation
    - name: Install 32-bit system dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y gcc-multilib g++-multilib libc6-dev:i386 libasound2-dev:i386 libsdl2-dev:i386

    # Everything inside this block runs within the 32-bit Conda environment shell
    - name: Install Python dependencies and Build
      shell: bash -el {0}
      run: |
        # Verify that Python sees itself running on a 32-bit architecture
        python -c "import platform; print(platform.architecture())"
        
        python -m pip install --upgrade pip
        pip install pyinstaller pygame ply llvmlite
        
        pyinstaller --onefile --name=myo \
          --add-data "parser_myo.py:." \
          --add-data "lexer.py:." \
          --add-data "ast_nodes.py:." \
          --add-data "codegen.py:." \
          myo.py

    - name: Upload Compiled 32-bit Linux Binary
      uses: actions/upload-artifact@v4
      with:
        name: myo-linux
        path: dist/myo
